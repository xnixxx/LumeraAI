name: iOS & watchOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build LumeraAI (iOS + watchOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.3
        run: sudo xcode-select -switch /Applications/Xcode_15.3.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/mobile
        run: xcodegen generate --spec project.yml

      - name: List generated schemes and targets
        working-directory: apps/mobile
        run: xcodebuild -project LumeraAI.xcodeproj -list

      - name: List available simulators
        run: xcrun simctl list devices available --json | python3 -c "
import json, sys
data = json.load(sys.stdin)
for runtime, devices in data['devices'].items():
    if 'iOS' in runtime or 'watchOS' in runtime:
        for d in devices:
            if d['isAvailable']:
                print(runtime, '->', d['name'])
"

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ hashFiles('apps/mobile/project.yml') }}-${{ github.sha }}
          restore-keys: xcode-${{ hashFiles('apps/mobile/project.yml') }}-

      - name: Build iOS app (simulator)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination 'platform=iOS Simulator,name=iPhone 15,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build 2>&1

      - name: Build watchOS app (simulator)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme "LumeraAI Watch App" \
            -destination 'platform=watchOS Simulator,name=Apple Watch SE (40mm) (2nd generation),OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build 2>&1

      - name: Archive (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.APPLE_TEAM_ID != ''
        working-directory: apps/mobile
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination generic/platform=iOS \
            -configuration Release \
            -archivePath build/LumeraAI.xcarchive \
            DEVELOPMENT_TEAM="${APPLE_TEAM_ID}" \
            archive 2>&1

      - name: Upload archive artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && env.APPLE_TEAM_ID != ''
        uses: actions/upload-artifact@v4
        with:
          name: LumeraAI-archive
          path: apps/mobile/build/LumeraAI.xcarchive
          retention-days: 14
