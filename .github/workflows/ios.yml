name: "iOS and watchOS Build"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: "Build LumeraAI (iOS and watchOS)"
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: apps/mobile
        run: xcodegen generate --spec project.yml

      - name: List generated schemes and targets
        working-directory: apps/mobile
        run: xcodebuild -project LumeraAI.xcodeproj -list

      - name: List available simulators
        run: |
          xcrun simctl list devices available --json | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          for runtime, devices in data['devices'].items():
              if 'iOS' in runtime or 'watchOS' in runtime:
                  for d in devices:
                      if d['isAvailable']:
                          print(runtime, '->', d['name'])
          "

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ hashFiles('apps/mobile/project.yml') }}-${{ github.sha }}
          restore-keys: xcode-${{ hashFiles('apps/mobile/project.yml') }}-

      - name: Build iOS app (simulator)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build 2>&1

      - name: Build unsigned IPA for AltStore sideloading
        working-directory: apps/mobile
        run: |
          set -o pipefail

          # Build for real device, no signing
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination generic/platform=iOS \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1

          # Package .app into unsigned .ipa
          mkdir -p build/Payload
          cp -r build/DerivedData/Build/Products/Release-iphoneos/LumeraAI.app build/Payload/
          cd build && zip -r LumeraAI-unsigned.ipa Payload/
          echo "IPA created: $(du -sh LumeraAI-unsigned.ipa)"

      - name: Upload unsigned IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: LumeraAI-unsigned-ipa
          path: apps/mobile/build/LumeraAI-unsigned.ipa
          retention-days: 30

      - name: Build watchOS app (simulator)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme "LumeraAI Watch App" \
            -destination 'platform=watchOS Simulator,name=Apple Watch SE (40mm),OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build 2>&1

      - name: Archive and upload to TestFlight
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.TESTFLIGHT_ENABLED == 'true'
        working-directory: apps/mobile
        env:
          APPLE_TEAM_ID:                 ${{ secrets.APPLE_TEAM_ID }}
          APPLE_CERTIFICATE:             ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD:    ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_PROVISIONING_PROFILE:    ${{ secrets.APPLE_PROVISIONING_PROFILE }}
          APP_STORE_CONNECT_API_KEY:     ${{ secrets.APP_STORE_CONNECT_API_KEY }}
          APP_STORE_CONNECT_ISSUER_ID:   ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          APP_STORE_CONNECT_KEY_ID:      ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
        run: |
          set -o pipefail

          # Install certificate into keychain
          echo "$APPLE_CERTIFICATE" | base64 --decode > certificate.p12
          security create-keychain -p "" build.keychain
          security import certificate.p12 -k build.keychain -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security list-keychains -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security set-key-partition-list -S apple-tool:,apple: -s -k "" build.keychain

          # Install provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$APPLE_PROVISIONING_PROFILE" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/LumeraAI.mobileprovision

          # Archive
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination generic/platform=iOS \
            -configuration Release \
            -archivePath build/LumeraAI.xcarchive \
            DEVELOPMENT_TEAM="$APPLE_TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="LumeraAI" \
            archive 2>&1

          # Export IPA
          cat > build/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${APPLE_TEAM_ID}</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath build/LumeraAI.xcarchive \
            -exportOptionsPlist build/ExportOptions.plist \
            -exportPath build/ipa 2>&1

          # Upload to TestFlight via App Store Connect API
          xcrun altool --upload-app \
            --type ios \
            --file build/ipa/LumeraAI.ipa \
            --apiKey "$APP_STORE_CONNECT_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_ISSUER_ID" 2>&1

      - name: Upload IPA artifact (backup)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push' && vars.TESTFLIGHT_ENABLED == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: LumeraAI-ipa
          path: apps/mobile/build/ipa/LumeraAI.ipa
          retention-days: 14
