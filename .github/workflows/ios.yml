name: iOS & watchOS Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:    # allows manual trigger from GitHub UI

jobs:
  build:
    name: Build LumeraAI (iOS + watchOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15.3
        run: sudo xcode-select -switch /Applications/Xcode_15.3.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Install xcpretty
        run: gem install xcpretty --no-document

      - name: Generate Xcode project
        working-directory: apps/mobile
        run: xcodegen generate --spec project.yml

      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ hashFiles('apps/mobile/project.yml') }}-${{ github.sha }}
          restore-keys: xcode-${{ hashFiles('apps/mobile/project.yml') }}-

      - name: Build iOS app (simulator)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination 'platform=iOS Simulator,name=iPhone 15 Pro,OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
          | xcpretty --color

      - name: Build watchOS app (simulator)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme "LumeraAI Watch App" \
            -destination 'platform=watchOS Simulator,name=Apple Watch Series 9 (45mm),OS=latest' \
            -configuration Debug \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=YES \
            build \
          | xcpretty --color

      - name: Archive (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        working-directory: apps/mobile
        env:
          DEVELOPMENT_TEAM: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -o pipefail
          xcodebuild \
            -project LumeraAI.xcodeproj \
            -scheme LumeraAI \
            -destination generic/platform=iOS \
            -configuration Release \
            -archivePath build/LumeraAI.xcarchive \
            DEVELOPMENT_TEAM="${DEVELOPMENT_TEAM}" \
            archive \
          | xcpretty --color

      - name: Upload archive artifact
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-artifact@v4
        with:
          name: LumeraAI-archive
          path: apps/mobile/build/LumeraAI.xcarchive
          retention-days: 14

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcode-build-logs
          path: ~/Library/Logs/DiagnosticReports/
          retention-days: 3
