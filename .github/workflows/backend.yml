name: "Backend and Packages CI"

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typecheck-and-build:
    name: "Typecheck and Build"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build packages in dependency order
        run: |
          npm run build -w packages/domain
          npm run build -w packages/config
          npm run build -w packages/guidance-core
          npm run build -w packages/perception-types
          npm run build -w packages/api-contracts
          npm run build -w services/backend

      - name: Typecheck all packages
        run: npm run --workspaces --if-present typecheck

  backend-db-check:
    name: "Backend and Database"
    runs-on: ubuntu-latest
    needs: typecheck-and-build

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: lumera
          POSTGRES_PASSWORD: lumera_test
          POSTGRES_DB: lumera_test
        ports:
          - 5432:5432
        options: "--health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5"

    env:
      DB_HOST: localhost
      DB_PORT: "5432"
      DB_NAME: lumera_test
      DB_USER: lumera
      DB_PASSWORD: lumera_test
      JWT_SECRET: ci-test-secret
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build packages in dependency order
        run: |
          npm run build -w packages/domain
          npm run build -w packages/config
          npm run build -w packages/guidance-core
          npm run build -w packages/perception-types
          npm run build -w packages/api-contracts
          npm run build -w services/backend

      - name: Apply database schema
        run: psql "postgresql://lumera:lumera_test@localhost:5432/lumera_test" -f services/backend/migrations/001_initial_schema.sql

      - name: Verify schema applied
        run: psql "postgresql://lumera:lumera_test@localhost:5432/lumera_test" -c '\dt' | grep users
